modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "geckolib"
type = "optional"
versionRange = "[4.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "curios"
type = "optional"
versionRange = "[9.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "tacz"
type = "optional"
versionRange = "[1.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "superbwarfare"
type = "optional"
versionRange = "[0.8,)"
ordering = "NONE"
side = "BOTH"
